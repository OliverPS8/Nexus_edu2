<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus_edu - IA para Professores</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            nexus: {
              bg: '#0A0F1C',
              surface: '#111827',
              primary: '#00D4FF',
              accent: '#FF7A00',
              muted: '#94A3B8'
            }
          },
          boxShadow: {
            'neon': '0 0 8px rgba(0, 212, 255, 0.35)',
            'glow': '0 0 10px rgba(255, 122, 0, 0.4)'
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@latest/font/lucide.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .input-nexus { @apply w-full bg-nexus-bg border border-white/10 rounded-lg px-4 py-3 text-white placeholder:text-nexus-muted focus:outline-none focus:border-nexus-primary transition; }
    .btn-primary { @apply bg-nexus-primary text-nexus-bg font-semibold px-6 py-3 rounded-lg shadow-neon hover:shadow-[0_0_14px_rgba(0,212,255,0.6)] transition disabled:opacity-50 flex items-center justify-center gap-2; }
    .card { @apply bg-nexus-surface border border-white/10 rounded-xl p-5 hover:border-nexus-primary/30 transition; }
  </style>
</head>
<body class="min-h-screen bg-nexus-bg text-white">
  <!-- Header Mobile -->
  <header class="sticky top-0 z-10 bg-nexus-bg/95 backdrop-blur border-b border-white/10 px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-nexus-primary to-nexus-accent flex items-center justify-center font-bold shadow-neon">N</div>
      <span class="font-semibold">Nexus_edu</span>
    </div>
    <button class="text-nexus-primary text-sm">IA</button>
  </header>

  <!-- Conteúdo Principal -->
  <main class="p-4 space-y-6">
    
    <!-- Boas-vindas -->
    <div class="text-center py-4">
      <h1 class="text-2xl font-bold bg-gradient-to-r from-nexus-primary to-nexus-accent bg-clip-text text-transparent">
        Bem-vindo ao Nexus_edu
      </h1>
      <p class="text-nexus-muted text-sm mt-1">IA para apoiar professores brasileiros</p>
    </div>

    <!-- Cards -->
    <div class="grid grid-cols-2 gap-3">
      <div class="card text-center">
        <div class="text-2xl font-bold text-nexus-primary">24</div>
        <div class="text-xs text-nexus-muted">Alunos</div>
      </div>
      <div class="card text-center">
        <div class="text-2xl font-bold text-nexus-accent">3</div>
        <div class="text-xs text-nexus-muted">Turmas</div>
      </div>
    </div>

    <!-- Formulário IA -->
    <div class="card">
      <h2 class="font-semibold mb-4 flex items-center gap-2">
        <i data-lucide="sparkles" class="text-nexus-accent"></i>
        Gerar Plano com IA
      </h2>
      
      <form id="aiForm" class="space-y-3">
        <input type="text" id="subject" placeholder="Disciplina (ex: Matemática)" class="input-nexus">
        <input type="text" id="grade" placeholder="Série (ex: 7º Ano)" class="input-nexus">
        <textarea id="theme" placeholder="Tema da aula" rows="3" class="input-nexus"></textarea>
        
        <button type="submit" id="generateBtn" class="btn-primary w-full">
          <i data-lucide="sparkles" class="w-4 h-4"></i>
          <span id="btnText">Gerar com IA</span>
        </button>
      </form>

      <!-- Resultado -->
      <div id="result" class="mt-4 hidden">
        <div class="border border-nexus-primary/30 rounded-lg p-4 bg-nexus-bg/50">
          <h3 id="planTitle" class="font-semibold text-nexus-primary mb-2"></h3>
          <div id="planContent" class="text-sm space-y-2"></div>
        </div>
      </div>
    </div>

    <!-- Rodapé -->
    <footer class="text-center text-xs text-nexus-muted pt-4 border-t border-white/10">
      Conforme BNCC, LDB, MEC • Leis 15.100/2025 e 14.180/2026
    </footer>
  </main>

  <!-- Scripts -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
    
    // ⚠️ COLOQUE SUA CHAVE QWEN ABAIXO:
    const QWEN_API_KEY = "LTAI5t6yYebuRAwAT7ytZEqx
MGU2C2EWTxEGbnxioHdy4N8ClcN5a7
  ";
    
    document.getElementById('aiForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('generateBtn');
      const btnText = document.getElementById('btnText');
      const result = document.getElementById('result');
      
      btn.disabled = true;
      btnText.textContent = "Gerando...";
      result.classList.add('hidden');
      
      const subject = document.getElementById('subject').value;
      const grade = document.getElementById('grade').value;
      const theme = document.getElementById('theme').value;
      
      try {
        const response = await fetch("https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${QWEN_API_KEY}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: "qwen-plus",
            messages: [
              { role: "system", content: "Responda APENAS em JSON: {\"title\":\"...\",\"steps\":[\"...\"],\"resources\":[\"...\"],\"assessment\":\"...\"}. Alinhe com BNCC." },
              { role: "user", content: `Plano para: ${subject}, ${grade}, tema: ${theme}` }
            ],
            response_format: { type: "json_object" }
          })
        });
        
        if (!response.ok) throw new Error("API error");
        const data = await response.json();
        const content = JSON.parse(data.choices[0].message.content);
        
        document.getElementById('planTitle').textContent = content.title;
        document.getElementById('planContent').innerHTML = 
          `<div><strong>📋 Etapas:</strong><br>${content.steps.map(s=>`• ${s}`).join('<br>')}</div>
           <div class="mt-2"><strong>📦 Recursos:</strong> ${content.resources.join(', ')}</div>
           <div class="mt-2"><strong>✅ Avaliação:</strong> ${content.assessment}</div>`;
        result.classList.remove('hidden');
        
      } catch (err) {
        // Fallback mock
        document.getElementById('planTitle').textContent = `Plano: ${subject || 'Aula'}`;
        document.getElementById('planContent').innerHTML = 
          `<div><strong>📋 Etapas:</strong><br>• Introdução (10 min)<br>• Desenvolvimento (25 min)<br>• Fechamento (10 min)</div>
           <div class="mt-2"><strong>📦 Recursos:</strong> Quadro, ficha de atividade</div>
           <div class="mt-2"><strong>✅ Avaliação:</strong> Observação contínua</div>
           <div class="mt-2 text-xs text-nexus-muted">⚠️ Modo demonstração</div>`;
        result.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btnText.textContent = "Gerar com IA";
      }
    });
  </script>
</body>
</html>
